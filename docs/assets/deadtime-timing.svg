<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="480" viewBox="0 0 1000 480" role="img" aria-labelledby="title desc">
  <title id="title">Dead-time insertion timing diagram</title>
  <desc id="desc">Timing diagram showing dead-time insertion effect on upper/lower gate signals and output voltage for positive load current.</desc>
  <style>
    .bg { fill: #fbf8f2; }
    .txt { font-family: Arial, Helvetica, sans-serif; fill: #182126; }
    .head { font-size: 24px; font-weight: 700; }
    .label { font-size: 16px; }
    .small { font-size: 13px; fill: #5b6468; }
    .level { font-size: 12px; fill: #5b6468; }
    .formula { font-size: 15px; fill: #5b6468; font-style: italic; }
    .ideal { stroke: #182126; stroke-width: 2.5; fill: none; }
    .upper { stroke: #c14f2c; stroke-width: 2.5; fill: none; }
    .lower { stroke: #4e7a76; stroke-width: 2.5; fill: none; }
    .output { stroke: #182126; stroke-width: 3; fill: none; }
    .dt-shade { fill: rgba(193,79,44,0.1); stroke: #c14f2c; stroke-width: 1; stroke-dasharray: 3 3; }
    .dim-line { stroke: #c14f2c; stroke-width: 1.2; fill: none; }
    .dim-arrow { fill: #c14f2c; }
    .grid { stroke: #e0dcd6; stroke-width: 0.8; stroke-dasharray: 4 4; }
  </style>
  <defs>
    <marker id="dim-left" markerWidth="7" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <path d="M7,0 L0,3.5 L7,7 z" class="dim-arrow" />
    </marker>
    <marker id="dim-right" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 z" class="dim-arrow" />
    </marker>
  </defs>

  <!-- Background -->
  <rect class="bg" x="0" y="0" width="1000" height="480" rx="24" ry="24" />

  <!-- Heading -->
  <text class="txt head" x="40" y="40">Dead-time effect on gate signals and output</text>

  <!-- Horizontal separator lines between rows -->
  <line class="grid" x1="160" y1="140" x2="900" y2="140" />
  <line class="grid" x1="160" y1="230" x2="900" y2="230" />
  <line class="grid" x1="160" y1="320" x2="900" y2="320" />

  <!-- ================================================================ -->
  <!-- Row labels (left side)                                           -->
  <!-- ================================================================ -->
  <text class="txt label" x="30" y="98">Ideal S</text>
  <text class="txt label" x="102" y="98" font-size="13" baseline-shift="sub">u</text>
  <text class="txt label" x="30" y="188" fill="#c14f2c">Upper gate</text>
  <text class="txt label" x="30" y="278" fill="#4e7a76">Lower gate</text>
  <text class="txt label" x="30" y="376">Output</text>
  <text class="txt small" x="30" y="394">(i &gt; 0)</text>

  <!-- Level labels -->
  <text class="level" x="142" y="74">1</text>
  <text class="level" x="142" y="124">0</text>
  <text class="level" x="142" y="164">1</text>
  <text class="level" x="142" y="214">0</text>
  <text class="level" x="142" y="254">1</text>
  <text class="level" x="142" y="304">0</text>
  <text class="level" x="130" y="354">V<tspan font-size="10" baseline-shift="sub">dc</tspan></text>
  <text class="level" x="130" y="414">0V</text>

  <!-- ================================================================ -->
  <!-- Dead-time shading (y=60 to y=420, spanning all 4 rows)           -->
  <!-- dt1: 260-290, dt2: 460-490, dt3: 600-630, dt4: 780-810          -->
  <!-- ================================================================ -->
  <rect class="dt-shade" x="260" y="60" width="30" height="360" />
  <rect class="dt-shade" x="460" y="60" width="30" height="360" />
  <rect class="dt-shade" x="600" y="60" width="30" height="360" />
  <rect class="dt-shade" x="780" y="60" width="30" height="360" />

  <!-- ================================================================ -->
  <!-- Row 1: Ideal gate signal                                         -->
  <!-- L(160-260), H(260-460), L(460-600), H(600-780), L(780-900)      -->
  <!-- ================================================================ -->
  <path class="ideal" d="M160,120 H260 V70 H460 V120 H600 V70 H780 V120 H900" />

  <!-- ================================================================ -->
  <!-- Row 2: Actual upper gate                                         -->
  <!-- L(160-290), H(290-460), L(460-630), H(630-780), L(780-900)      -->
  <!-- ================================================================ -->
  <path class="upper" d="M160,210 H290 V160 H460 V210 H630 V160 H780 V210 H900" />

  <!-- ================================================================ -->
  <!-- Row 3: Actual lower gate                                         -->
  <!-- H(160-260), L(260-490), H(490-600), L(600-810), H(810-900)      -->
  <!-- ================================================================ -->
  <path class="lower" d="M160,250 H260 V300 H490 V250 H600 V300 H810 V250 H900" />

  <!-- ================================================================ -->
  <!-- Row 4: Output voltage (i > 0)                                    -->
  <!-- 0V(160-290), Vdc(290-460), 0V(460-630), Vdc(630-780), 0V(780-900) -->
  <!-- ================================================================ -->
  <path class="output" d="M160,410 H290 V350 H460 V410 H630 V350 H780 V410 H900" />

  <!-- ================================================================ -->
  <!-- Dead-time dimension annotation (first interval, 260-290)         -->
  <!-- ================================================================ -->
  <!-- Vertical leader lines -->
  <line class="dim-line" x1="260" y1="128" x2="260" y2="145" />
  <line class="dim-line" x1="290" y1="128" x2="290" y2="145" />
  <!-- Horizontal dimension line with arrows -->
  <line class="dim-line" x1="260" y1="140" x2="290" y2="140"
        marker-start="url(#dim-left)" marker-end="url(#dim-right)" />
  <!-- Label -->
  <text class="txt" x="264" y="136" font-size="13" fill="#c14f2c">t<tspan font-size="10" baseline-shift="sub">d</tspan></text>

  <!-- Second dead-time label (460-490) -->
  <line class="dim-line" x1="460" y1="128" x2="460" y2="145" />
  <line class="dim-line" x1="490" y1="128" x2="490" y2="145" />
  <line class="dim-line" x1="460" y1="140" x2="490" y2="140"
        marker-start="url(#dim-left)" marker-end="url(#dim-right)" />
  <text class="txt" x="464" y="136" font-size="13" fill="#c14f2c">t<tspan font-size="10" baseline-shift="sub">d</tspan></text>

  <!-- ================================================================ -->
  <!-- Annotation: "both OFF" note near first dead-time                 -->
  <!-- ================================================================ -->
  <text class="small" x="168" y="448">both OFF</text>
  <text class="small" x="168" y="462">diode conducts (i &gt; 0): output low</text>
  <!-- Small arrow pointing from annotation to first dead-time zone -->
  <line x1="225" y1="440" x2="270" y2="425" stroke="#5b6468" stroke-width="0.8" />

  <!-- ================================================================ -->
  <!-- Formula box (bottom right)                                       -->
  <!-- ================================================================ -->
  <rect x="640" y="436" width="340" height="34" rx="8" ry="8" fill="#fffdf8" stroke="#e0dcd6" stroke-width="1" />
  <text class="formula" x="654" y="459"><tspan font-style="normal">&#x0394;</tspan>v<tspan font-size="11" baseline-shift="sub">dt</tspan> = &#x2212;sgn(i) &#x00B7; t<tspan font-size="11" baseline-shift="sub">d</tspan> &#x00B7; f<tspan font-size="11" baseline-shift="sub">c</tspan> &#x00B7; V<tspan font-size="11" baseline-shift="sub">dc</tspan></text>
</svg>
