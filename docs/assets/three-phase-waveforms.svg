<svg xmlns="http://www.w3.org/2000/svg" width="960" height="380" viewBox="0 0 960 380" role="img" aria-labelledby="title desc">
  <title id="title">Balanced three-phase sinusoidal waveforms</title>
  <desc id="desc">Three sinusoidal voltages (u, v, w) displaced by 120 degrees, illustrating balanced three-phase symmetry and the zero-sum property.</desc>
  <style>
    .bg { fill: #fbf8f2; }
    .axis { stroke: #182126; stroke-width: 2.5; fill: none; }
    .grid { stroke: #d8d5cd; stroke-width: 1; fill: none; }
    .grid-dash { stroke: #d8d5cd; stroke-width: 1; fill: none; stroke-dasharray: 6,4; }
    .u-phase { stroke: #c14f2c; stroke-width: 3; fill: none; }
    .v-phase { stroke: #4e7a76; stroke-width: 3; fill: none; }
    .w-phase { stroke: #7b6ea0; stroke-width: 3; fill: none; }
    .txt { font-family: Arial, Helvetica, sans-serif; fill: #182126; font-size: 18px; }
    .small { font-size: 15px; fill: #5b6468; }
    .head { font-size: 24px; font-weight: 700; }
    .annotation { font-size: 14px; fill: #182126; font-family: Arial, Helvetica, sans-serif; }
    .annot-line { stroke: #182126; stroke-width: 1.2; fill: none; stroke-dasharray: 5,3; }
    .arrow-line { stroke: #182126; stroke-width: 1.5; fill: none; }
    .legend-u { stroke: #c14f2c; stroke-width: 3; }
    .legend-v { stroke: #4e7a76; stroke-width: 3; }
    .legend-w { stroke: #7b6ea0; stroke-width: 3; }
  </style>

  <!-- Background -->
  <rect class="bg" x="0" y="0" width="960" height="380" rx="24" ry="24" />

  <!-- Heading -->
  <text class="txt head" x="46" y="42">Balanced three-phase voltages</text>

  <!-- Horizontal grid lines: y=80, y=190, y=300 -->
  <line class="grid" x1="100" y1="80" x2="900" y2="80" />
  <line class="grid" x1="100" y1="190" x2="900" y2="190" />
  <line class="grid" x1="100" y1="300" x2="900" y2="300" />

  <!-- Vertical grid lines (dashed) at each π/3 interval -->
  <!-- π/3 intervals: x = 100 + (800/6)*k for k=1..5 => 233.3, 366.7, 500, 633.3, 766.7 -->
  <line class="grid-dash" x1="233.3" y1="80" x2="233.3" y2="300" />
  <line class="grid-dash" x1="366.7" y1="80" x2="366.7" y2="300" />
  <line class="grid-dash" x1="500" y1="80" x2="500" y2="300" />
  <line class="grid-dash" x1="633.3" y1="80" x2="633.3" y2="300" />
  <line class="grid-dash" x1="766.7" y1="80" x2="766.7" y2="300" />

  <!-- Axes -->
  <path class="axis" d="M100 80 V300 H900" />

  <!-- Y-axis labels -->
  <text class="txt small" x="28" y="85">+V<tspan font-size="12" baseline-shift="sub">ph,pk</tspan></text>
  <text class="txt small" x="72" y="195">0</text>
  <text class="txt small" x="30" y="305">−V<tspan font-size="12" baseline-shift="sub">ph,pk</tspan></text>

  <!-- X-axis angle labels -->
  <text class="txt small" text-anchor="middle" x="100" y="320">0</text>
  <text class="txt small" text-anchor="middle" x="233.3" y="320">π/3</text>
  <text class="txt small" text-anchor="middle" x="366.7" y="320">2π/3</text>
  <text class="txt small" text-anchor="middle" x="500" y="320">π</text>
  <text class="txt small" text-anchor="middle" x="633.3" y="320">4π/3</text>
  <text class="txt small" text-anchor="middle" x="766.7" y="320">5π/3</text>
  <text class="txt small" text-anchor="middle" x="900" y="320">2π</text>

