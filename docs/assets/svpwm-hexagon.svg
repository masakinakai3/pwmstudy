<svg xmlns="http://www.w3.org/2000/svg" width="960" height="760" viewBox="0 0 960 760" role="img" aria-labelledby="title desc">
  <title id="title">SVPWM hexagon</title>
  <desc id="desc">Alpha-beta plane with active vectors V1-V6, zero vectors V0/V7, switching states, sectors 1-6, inscribed circle (linear limit), circumscribed circle (vertex radius), and a reference vector Vref with angle theta in sector 1.</desc>
  <style>
    .bg { fill: #fbf8f2; }
    .axis { stroke: #182126; stroke-width: 2.5; fill: none; }
    .hex { stroke: #182126; stroke-width: 4; fill: rgba(78,122,118,0.06); }
    .sector { stroke: #b8b5ad; stroke-width: 1.5; stroke-dasharray: 7 7; }
    .circle { stroke: #c14f2c; stroke-width: 3; fill: none; }
    .circ-outer { stroke: #b8b5ad; stroke-width: 2; stroke-dasharray: 8 6; fill: none; }
    .vec { stroke: #4e7a76; stroke-width: 3; fill: none; }
    .ref { stroke: #c14f2c; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    .theta-arc { stroke: #182126; stroke-width: 1.5; fill: none; }
    .dot { fill: #182126; }
    .txt { font-family: Arial, Helvetica, sans-serif; fill: #182126; font-size: 22px; }
    .small { font-size: 16px; fill: #5b6468; }
    .tuple { font-size: 14px; fill: #5b6468; font-family: Arial, Helvetica, sans-serif; }
    .sector-num { font-size: 20px; fill: #b8b5ad; font-family: Arial, Helvetica, sans-serif; text-anchor: middle; }
    .head { font-size: 28px; font-weight: 700; }
    .legend { font-size: 15px; fill: #5b6468; font-family: Arial, Helvetica, sans-serif; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#c14f2c" />
    </marker>
  </defs>

  <!-- background -->
  <rect class="bg" x="0" y="0" width="960" height="760" rx="24" ry="24" />
  <text class="txt head" x="42" y="48">SVPWM alpha-beta plane</text>

  <!-- alpha / beta axes -->
  <path class="axis" d="M140 380 H820 M480 660 V100" />
  <text class="txt" x="826" y="388">alpha</text>
  <text class="txt" x="490" y="92">beta</text>

  <!-- hexagon -->
  <polygon class="hex" points="700,380 590,190 370,190 260,380 370,570 590,570" />

  <!-- sector dividing lines (dashed) -->
  <line class="sector" x1="480" y1="380" x2="700" y2="380" />
  <line class="sector" x1="480" y1="380" x2="590" y2="190" />
  <line class="sector" x1="480" y1="380" x2="370" y2="190" />
  <line class="sector" x1="480" y1="380" x2="260" y2="380" />
  <line class="sector" x1="480" y1="380" x2="370" y2="570" />
  <line class="sector" x1="480" y1="380" x2="590" y2="570" />

  <!-- circumscribed circle (vertex radius, dashed) -->
  <circle class="circ-outer" cx="480" cy="380" r="220" />

  <!-- inscribed circle (linear limit, solid red) -->
  <circle class="circle" cx="480" cy="380" r="190" />

  <!-- active vector lines (teal) -->
  <line class="vec" x1="480" y1="380" x2="700" y2="380" />
  <line class="vec" x1="480" y1="380" x2="590" y2="190" />
  <line class="vec" x1="480" y1="380" x2="370" y2="190" />
  <line class="vec" x1="480" y1="380" x2="260" y2="380" />
  <line class="vec" x1="480" y1="380" x2="370" y2="570" />
  <line class="vec" x1="480" y1="380" x2="590" y2="570" />

  <!-- Vref arrow in sector 1 -->
  <path class="ref" d="M480 380 L632 288" />

  <!-- theta angle arc (0 deg to ~31 deg) -->
  <path class="theta-arc" d="M525,380 A45,45 0 0,0 518.6,356.8" />
  <text class="txt small" x="530" y="368" font-style="italic" font-size="18px">&#952;</text>

  <!-- origin dot -->
  <circle class="dot" cx="480" cy="380" r="6" />

  <!-- active vector labels V1-V6 -->
  <text class="txt" x="708" y="384">V1</text>
  <text class="txt" x="602" y="182">V2</text>
  <text class="txt" x="328" y="182">V3</text>
  <text class="txt" x="230" y="384">V4</text>
  <text class="txt" x="330" y="602">V5</text>
  <text class="txt" x="602" y="602">V6</text>

  <!-- switching state tuples (Su,Sv,Sw) -->
  <text class="tuple" x="708" y="404">(1,0,0)</text>
  <text class="tuple" x="600" y="172">(1,1,0)</text>
  <text class="tuple" x="310" y="172">(0,1,0)</text>
  <text class="tuple" x="210" y="404">(0,1,1)</text>
  <text class="tuple" x="312" y="618">(0,0,1)</text>
  <text class="tuple" x="600" y="618">(1,0,1)</text>

  <!-- zero vectors V0, V7 at origin -->
  <text class="txt small" x="480" y="404" text-anchor="middle">V0, V7</text>
  <text class="tuple" x="480" y="420" text-anchor="middle">(0,0,0) / (1,1,1)</text>

  <!-- sector numbers 1-6 -->
  <text class="sector-num" x="579" y="323">1</text>
  <text class="sector-num" x="480" y="266">2</text>
  <text class="sector-num" x="381" y="323">3</text>
  <text class="sector-num" x="381" y="437">4</text>
  <text class="sector-num" x="480" y="494">5</text>
  <text class="sector-num" x="579" y="437">6</text>

  <!-- Vref label -->
  <text class="txt small" x="622" y="268">Vref</text>

  <!-- legend -->
  <line x1="346" y1="676" x2="386" y2="676" stroke="#c14f2c" stroke-width="3" />
  <text class="legend" x="394" y="681">inscribed circle = linear limit (2/&#8730;3 &#8776; 1.155)</text>
  <line x1="346" y1="702" x2="386" y2="702" stroke="#b8b5ad" stroke-width="2" stroke-dasharray="8 6" />
  <text class="legend" x="394" y="707">circumscribed circle = vertex radius (4/3 &#8776; 1.333)</text>
</svg>
