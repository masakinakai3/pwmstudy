<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Carrier comparison waveform</title>
  <desc id="desc">Reference sine, triangular carrier, and switching waveform generated by natural sampling with accurate intersection geometry.</desc>
  <style>
    .bg      { fill: #fbf8f2; }
    .axis    { stroke: #182126; stroke-width: 2.5; fill: none; }
    .grid    { stroke: #d8d5cd; stroke-width: 1; fill: none; }
    .sine    { stroke: #c14f2c; stroke-width: 3.5; fill: none; }
    .carrier { stroke: #4e7a76; stroke-width: 2.5; fill: none; }
    .pulse   { fill: rgba(193,79,44,0.18); stroke: #c14f2c; stroke-width: 2; }
    .cross   { stroke: #b8b5ad; stroke-width: 1; stroke-dasharray: 4 4; fill: none; }
    .txt     { font-family: Arial, Helvetica, sans-serif; fill: #182126; font-size: 20px; }
    .small   { font-size: 16px; fill: #5b6468; }
    .head    { font-size: 24px; font-weight: 700; }
    .lbl-ref { font-family: Arial, Helvetica, sans-serif; fill: #c14f2c; font-size: 18px; }
    .lbl-car { font-family: Arial, Helvetica, sans-serif; fill: #4e7a76; font-size: 18px; }
  </style>

  <!-- background -->
  <rect class="bg" x="0" y="0" width="1200" height="520" rx="24" ry="24"/>

  <!-- heading -->
  <text class="txt head" x="46" y="42">Natural sampling: reference vs carrier (ma=0.8, mf=9)</text>

  <!-- ===== top panel: reference vs carrier, y=90..350, x=90..1120 ===== -->

  <!-- horizontal grid lines -->
  <line class="grid" x1="90" y1="100" x2="1120" y2="100"/>
  <line class="grid" x1="90" y1="220" x2="1120" y2="220"/>
  <line class="grid" x1="90" y1="340" x2="1120" y2="340"/>

  <!-- axes -->
  <line class="axis" x1="90" y1="90" x2="90" y2="340"/>
  <line class="axis" x1="90" y1="340" x2="1120" y2="340"/>

  <!-- y-axis labels -->
  <text class="txt small" x="42" y="104">+1</text>
  <text class="txt small" x="52" y="224">0</text>
  <text class="txt small" x="42" y="338">-1</text>

  <!-- sine reference (ma=0.8, one fundamental period, 100 points) -->
  <polyline class="sine" points="
    90.0,220.0 100.3,214.0 110.6,207.9 121.0,202.0 131.3,196.1
    141.6,190.3 151.9,184.6 162.2,179.0 172.6,173.7 182.9,168.5
    193.2,163.5 203.5,158.7 213.8,154.2 224.2,149.9 234.5,145.9
    244.8,142.2 255.1,138.8 265.5,135.8 275.8,133.0 286.1,130.7
    296.4,128.6 306.7,127.0 317.1,125.7 327.4,124.7 337.7,124.2
    348.0,124.0 358.3,124.2 368.7,124.8 379.0,125.8 389.3,127.1
    399.6,128.8 409.9,130.9 420.3,133.3 430.6,136.1 440.9,139.2
    451.2,142.6 461.5,146.3 471.9,150.3 482.2,154.6 492.5,159.2
    502.8,164.0 513.1,169.0 523.5,174.2 533.8,179.6 544.1,185.2
    554.4,190.9 564.7,196.7 575.1,202.6 585.4,208.5 595.7,214.6
    606.0,220.6 616.4,226.6 626.7,232.7 637.0,238.6 647.3,244.5
    657.6,250.3 668.0,256.0 678.3,261.5 688.6,266.9 698.9,272.0
    709.2,277.0 719.6,281.8 729.9,286.3 740.2,290.5 750.5,294.5
    760.8,298.1 771.2,301.5 781.5,304.5 791.8,307.2 802.1,309.6
    812.4,311.6 822.8,313.2 833.1,314.5 843.4,315.3 853.7,315.9
    864.0,316.0 874.4,315.7 884.7,315.1 895.0,314.1 905.3,312.7
    915.7,311.0 926.0,308.9 936.3,306.4 946.6,303.6 956.9,300.5
    967.3,297.1 977.6,293.3 987.9,289.3 998.2,284.9 1008.5,280.4
    1018.9,275.5 1029.2,270.5 1039.5,265.3 1049.8,259.9 1060.1,254.3
    1070.5,248.6 1080.8,242.7 1091.1,236.8 1101.4,230.9 1111.7,224.8
  "/>

  <!-- triangular carrier (mf=9, valley-start) -->
  <polyline class="carrier" points="
    90.0,340.0 147.2,100.0 204.4,340.0 261.7,100.0 318.9,340.0
    376.1,100.0 433.3,340.0 490.6,100.0 547.8,340.0 605.0,100.0
    662.2,340.0 719.4,100.0 776.7,340.0 833.9,100.0 891.1,340.0
    948.3,100.0 1005.6,340.0 1062.8,100.0 1120.0,340.0
  "/>

  <!-- waveform labels -->
  <text class="lbl-ref" x="860" y="125">u ref</text>
  <text class="lbl-car" x="860" y="348">carrier</text>

  <!-- ===== crossing guide lines (dashed verticals from y=90 to y=470) ===== -->
  <line class="cross" x1="123.2"  y1="90" x2="123.2"  y2="470"/>
  <line class="cross" x1="165.6"  y1="90" x2="165.6"  y2="470"/>
  <line class="cross" x1="252.2"  y1="90" x2="252.2"  y2="470"/>
  <line class="cross" x1="269.9"  y1="90" x2="269.9"  y2="470"/>
  <line class="cross" x1="370.2"  y1="90" x2="370.2"  y2="470"/>
  <line class="cross" x1="382.3"  y1="90" x2="382.3"  y2="470"/>
  <line class="cross" x1="478.0"  y1="90" x2="478.0"  y2="470"/>
  <line class="cross" x1="506.2"  y1="90" x2="506.2"  y2="470"/>
  <line class="cross" x1="579.9"  y1="90" x2="579.9"  y2="470"/>
  <line class="cross" x1="638.2"  y1="90" x2="638.2"  y2="470"/>
  <line class="cross" x1="680.6"  y1="90" x2="680.6"  y2="470"/>
  <line class="cross" x1="767.2"  y1="90" x2="767.2"  y2="470"/>
  <line class="cross" x1="784.9"  y1="90" x2="784.9"  y2="470"/>
  <line class="cross" x1="885.2"  y1="90" x2="885.2"  y2="470"/>
  <line class="cross" x1="897.3"  y1="90" x2="897.3"  y2="470"/>
  <line class="cross" x1="993.0"  y1="90" x2="993.0"  y2="470"/>
  <line class="cross" x1="1021.2" y1="90" x2="1021.2" y2="470"/>
  <line class="cross" x1="1094.9" y1="90" x2="1094.9" y2="470"/>

  <!-- ===== bottom panel: switching signal Su, y=390..470 ===== -->

  <!-- horizontal axis -->
  <line class="axis" x1="90" y1="430" x2="1120" y2="430"/>

  <!-- labels -->
  <text class="txt" x="46" y="430">Su</text>
  <text class="txt small" x="60" y="402">1</text>
  <text class="txt small" x="60" y="462">0</text>

  <!-- switching pulses (filled rects, y=392 to y=430, height=38) -->
  <rect class="pulse" x="90.0"   y="392" width="33.2"  height="38"/>
  <rect class="pulse" x="165.6"  y="392" width="86.6"  height="38"/>
  <rect class="pulse" x="269.9"  y="392" width="100.3" height="38"/>
  <rect class="pulse" x="382.3"  y="392" width="95.7"  height="38"/>
  <rect class="pulse" x="506.2"  y="392" width="73.7"  height="38"/>
  <rect class="pulse" x="638.2"  y="392" width="42.4"  height="38"/>
  <rect class="pulse" x="767.2"  y="392" width="17.7"  height="38"/>
  <rect class="pulse" x="885.2"  y="392" width="12.1"  height="38"/>
  <rect class="pulse" x="993.0"  y="392" width="28.2"  height="38"/>
  <rect class="pulse" x="1094.9" y="392" width="25.1"  height="38"/>

  <!-- ===== annotation for 4th pulse ===== -->
  <text class="txt small" x="400" y="488">du = (1+v*u)/2</text>
</svg>
