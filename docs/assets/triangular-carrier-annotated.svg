<svg xmlns="http://www.w3.org/2000/svg" width="800" height="340" viewBox="0 0 800 340" role="img" aria-labelledby="title desc">
  <title id="title">Annotated triangular carrier waveform</title>
  <desc id="desc">Two complete cycles of a triangular carrier waveform with period Tc, annotated with piecewise formulas, phi ranges, and the compact absolute-value form.</desc>
  <style>
    .bg      { fill: #fbf8f2; }
    .grid    { stroke: #d8d5cd; stroke-width: 1; fill: none; }
    .axis    { stroke: #182126; stroke-width: 1.5; fill: none; }
    .carrier { stroke: #4e7a76; stroke-width: 3; fill: none; stroke-linejoin: round; }
    .dot     { fill: #182126; }
    .txt     { font-family: Arial, Helvetica, sans-serif; fill: #182126; }
    .head    { font-size: 24px; font-weight: 700; }
    .label   { font-size: 14px; fill: #5b6468; }
    .formula { font-size: 13px; fill: #5b6468; font-style: italic; }
    .bracket { stroke: #182126; stroke-width: 1.5; fill: none; }
    .brlabel { font-size: 14px; fill: #182126; }
    .fbox    { fill: #fffdf8; stroke: #4e7a76; stroke-width: 1.5; rx: 10; ry: 10; }
    .fboxtxt { font-size: 15px; fill: #182126; font-style: italic; }
  </style>

  <!-- background -->
  <rect class="bg" x="0" y="0" width="800" height="340" rx="24" ry="24"/>

  <!-- heading -->
  <text class="txt head" x="40" y="40">Triangular carrier waveform</text>

  <!-- horizontal grid lines: +1, 0, -1 -->
  <line class="grid" x1="100" y1="60"  x2="700" y2="60"/>
  <line class="grid" x1="100" y1="160" x2="700" y2="160"/>
  <line class="grid" x1="100" y1="260" x2="700" y2="260"/>

  <!-- vertical axis -->
  <line class="axis" x1="100" y1="55" x2="100" y2="265"/>
  <!-- horizontal zero axis -->
  <line class="axis" x1="95"  y1="160" x2="705" y2="160"/>

  <!-- y-axis labels -->
  <text class="txt label" x="78" y="65"  text-anchor="end">+1</text>
  <text class="txt label" x="78" y="163" text-anchor="end">0</text>
  <text class="txt label" x="78" y="258" text-anchor="end">−1</text>

  <!-- carrier waveform: 2 complete cycles -->
  <polyline class="carrier" points="100,260 250,60 400,260 550,60 700,260"/>

  <!-- key-point dots (valleys and peaks) -->
  <circle class="dot" cx="100" cy="260" r="5"/>
  <circle class="dot" cx="250" cy="60"  r="5"/>
  <circle class="dot" cx="400" cy="260" r="5"/>
  <circle class="dot" cx="550" cy="60"  r="5"/>
  <circle class="dot" cx="700" cy="260" r="5"/>

  <!-- x-axis time labels -->
  <text class="txt label" x="100" y="278" text-anchor="middle">t=0</text>
  <text class="txt label" x="250" y="278" text-anchor="middle">Tc/2</text>
  <text class="txt label" x="400" y="278" text-anchor="middle">Tc</text>
  <text class="txt label" x="550" y="278" text-anchor="middle">3Tc/2</text>
  <text class="txt label" x="700" y="278" text-anchor="middle">2Tc</text>

  <!-- period bracket from t=0 to Tc -->
  <path class="bracket" d="M100,292 L100,298 L400,298 L400,292"/>
  <text class="txt brlabel" x="250" y="315" text-anchor="middle">Tc = 1/fc</text>

  <!-- formula annotations along first ascending segment -->
  <text class="formula" x="155" y="140" text-anchor="middle">vc = 4φ − 1</text>
  <text class="formula" x="155" y="180" text-anchor="middle">φ ∈ [0, 0.5)</text>

  <!-- formula annotations along first descending segment -->
  <text class="formula" x="340" y="140" text-anchor="middle">vc = 3 − 4φ</text>
  <text class="formula" x="340" y="180" text-anchor="middle">φ ∈ [0.5, 1)</text>

  <!-- compact formula box (bottom right) -->
  <rect class="fbox" x="560" y="292" width="210" height="36"/>
  <text class="fboxtxt" x="665" y="316" text-anchor="middle">vc = 1 − 4|φ − 1/2|</text>
</svg>
